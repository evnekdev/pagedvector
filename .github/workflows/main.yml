name: Publish docs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build docs
        run: cargo doc --no-deps

      - name: Add index redirect
        run: |
          CRATE=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].name' | tr '-' '_')
          cat > target/doc/index.html <<EOF
          <!doctype html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=./${CRATE}/index.html">
            </head>
            <body>
              Redirecting...
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
